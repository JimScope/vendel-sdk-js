# Publishes to npm using Trusted Publishers (OIDC). No token needed.
#
# Setup:
#   1. Publish the first version manually: npm login && npm publish --access public
#   2. On npmjs.com, go to vendel-sdk → Settings → Trusted Publisher → GitHub Actions:
#        - User: JimScope
#        - Repository: vendel-sdk-js
#        - Workflow: publish.yml
#        - Environment: npm
#   3. Create the "npm" environment in GitHub: Settings → Environments → New
#
# Usage:
#   1. Update "version" in package.json
#   2. git tag v0.2.0 && git push origin v0.2.0

name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Publish to npm
        run: npm publish --provenance --access public
